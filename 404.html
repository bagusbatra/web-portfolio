<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan | Bagus Batara</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Native CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3));
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="parallax-bg"></div>
        <div class="container">
            <div class="card-modern p-5 reveal active mx-auto" style="max-width: 600px;">
                <div class="error-code">404</div>
                <h1 class="h2 fw-bold mb-4 text-white">Opps! Halaman Hilang di Luar Angkasa</h1>
                <p class="text-muted mb-5">
                    Halaman yang Anda cari mungkin telah dipindahkan, dihapus, atau tidak pernah ada. 
                    Mari kembali ke jalur yang benar.
                </p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="index.html" class="btn-modern btn-primary-modern">
                        <i class="fas fa-home me-2"></i> Kembali ke Beranda
                    </a>
                    <a href="contact.html" class="btn-modern btn-outline-modern">
                        Laporkan Masalah
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Native JS -->
    <script src="js/script.js"></script>
</body>
</html>
