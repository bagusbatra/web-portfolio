<!-- MODAL: EDIT ABOUT -->
<div class="modal fade" id="aboutModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit About</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="aboutForm">

          <div class="mb-3">
            <label class="form-label">Deskripsi</label>
            <textarea class="form-control" rows="4" id="aboutDesc"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Tanggal Lahir</label>
            <input type="text" class="form-control" id="aboutName">
          </div>

          <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" class="form-control" id="aboutName">
          </div>

          <div class="mb-3">
            <label class="form-label">Alamat</label>
            <input type="text" class="form-control" id="aboutName">
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" id="saveAbout">Simpan</button>
      </div>

    </div>
  </div>
</div>



<!-- MODAL: STATUS -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog modal-md modal-dialog-centered">
    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title">Edit Status</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">
        <form id="statusForm">

          <div class="mb-3">
            <label class="form-label">Pilih Status</label>
            <select class="form-select" id="statusSelect">
              <option value="">-- Pilih Status --</option>
              <option value="available">Available for Hire</option>
              <option value="freelance">Open to Freelance</option>
              <option value="busy">Currently Busy</option>
              <option value="learning">Learning / Improving</option>
              <option value="not_available">Not Available</option>
            </select>
          </div>

        </form>
      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" id="saveStatus">Simpan</button>
      </div>

    </div>
  </div>
</div>



<div class="modal fade" id="jobModal" tabindex="-1">
  <div class="modal-dialog modal-md modal-dialog-centered">
    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title">Edit Pekerjaan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">

        <form id="jobForm">
          <div id="jobContainer">

            <!-- FIELD AWAL -->
            <div class="job-item d-flex gap-2 mb-2">
              <input type="text" class="form-control job-input" placeholder="Masukkan pekerjaan">
              <button type="button" class="btn btn-danger btn-sm remove-job">✕</button>
            </div>

          </div>

          <!-- BUTTON TAMBAH -->
          <button type="button" class="btn btn-outline-primary btn-sm mt-2" id="addJob">
            + Tambah Pekerjaan
          </button>

        </form>

      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" id="saveJob">Simpan</button>
      </div>

    </div>
  </div>
</div>
